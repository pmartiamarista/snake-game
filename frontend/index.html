<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Snake Game</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐍</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./index.css">
  <script type="module" src="/index.ts"></script>
</head>
<body>
  <header>
    <div class="logo">SNAKE.WASM</div>
    <div class="stats">
      <div class="stat-item">
        <span class="stat-label">Score</span>
        <span id="score" class="stat-value">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">High Score</span>
        <span id="high-score" class="stat-value">0</span>
      </div>
    </div>
    <div id="status" style="display: none;">Ready</div>
  </header>

  <main>
    <div id="start-overlay" class="overlay">
      <div class="menu-card">
        <h2>SNAKE</h2>
        <div id="loading-status" style="margin-bottom: 2rem; font-size: 0.875rem; color: var(--text-dim)">
          Verifying prerequisites...
        </div>
        <button id="start-btn" class="btn-primary" disabled>LOADING...</button>
      </div>
    </div>

    <div id="game-over-overlay" class="overlay hidden">
      <div class="menu-card">
        <h2>GAME OVER</h2>
        <p id="final-score" style="margin-bottom: 2rem; font-size: 1.5rem; color: var(--accent-red)">Score: 0</p>
        <button id="restart-btn" class="btn-primary">RESTART</button>
      </div>
    </div>

    <div id="pause-overlay" class="overlay hidden">
      <div class="menu-card">
        <h2>PAUSED</h2>
        <p style="margin-bottom: 2rem; color: var(--text-dim)">Press SPACE or ENTER to resume</p>
        <button id="resume-btn" class="btn-primary">RESUME</button>
      </div>
    </div>

    <div class="canvas-container">
      <canvas id="snake-canvas" aria-label="Snake game area"></canvas>
    </div>

    <div class="mobile-controls">
      <button class="ctrl-btn up" data-dir="Up">↑</button>
      <button class="ctrl-btn left" data-dir="Left">←</button>
      <button class="ctrl-btn pause" id="mobile-pause">⏸</button>
      <button class="ctrl-btn right" data-dir="Right">→</button>
      <button class="ctrl-btn down" data-dir="Down">↓</button>
    </div>
  </main>
</body>
</html>
